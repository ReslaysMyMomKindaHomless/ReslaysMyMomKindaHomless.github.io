<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Webhook File Sender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="url"],
        input[type="file"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="url"]:focus,
        input[type="file"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="file"] {
            padding: 10px;
            cursor: pointer;
        }

        .file-list {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            background: #f9f9f9;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: white;
            margin-bottom: 8px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }

        .file-item-name {
            color: #333;
            font-size: 13px;
            flex: 1;
            word-break: break-all;
        }

        .file-item-remove {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .file-item-remove:hover {
            background: #ff5252;
        }

        .button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .button:active {
            transform: translateY(0);
        }

        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 14px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #1565c0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 Discord Webhook Sender</h1>
        <p class="subtitle">Envoie des fichiers sur Discord</p>

        <div class="info-box">
            💡 Colle une URL de webhook Discord pour envoyer tes fichiers.
            <br>
            ⚠️ Attention : l'envoi direct de fichiers vers l'API Discord depuis le navigateur peut être bloqué par CORS. Si vous rencontrez des erreurs, utilisez un relais serveur.
        </div>

        <form id="webhookForm">
            <div class="form-group">
                <label for="webhookUrl">🔗 URL du Webhook Discord :</label>
                <input 
                    type="url" 
                    id="webhookUrl" 
                    placeholder="https://discord.com/api/webhooks/..."
                >
            </div>

            <div class="form-group">
                <label for="fileInput">📁 Sélectionne tes fichiers :</label>
                <input 
                    type="file" 
                    id="fileInput" 
                    multiple
                >
            </div>

            <div class="file-list" id="fileList"></div>

            <button type="submit" class="button">📤 Envoyer sur Discord</button>

            <div class="status" id="status"></div>
        </form>
    </div>

    <script>
        // --- Code d'envoi des fichiers
        const form = document.getElementById('webhookForm');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const status = document.getElementById('status');
        let selectedFiles = [];

        // Afficher les fichiers sélectionnés
        fileInput.addEventListener('change', (e) => {
            selectedFiles = Array.from(e.target.files);
            updateFileList();
        });

        function updateFileList() {
            fileList.innerHTML = '';
            if (selectedFiles.length === 0) {
                fileList.innerHTML = '<p style="color: #999; text-align: center;">Aucun fichier sélectionné</p>';
                return;
            }

            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <span class="file-item-name">${file.name} (${(file.size / 1024).toFixed(2)} KB)</span>
                    <button type="button" class="file-item-remove" onclick="removeFile(${index})">Supprimer</button>
                `;
                fileList.appendChild(fileItem);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
            if (selectedFiles.length === 0) {
                fileInput.value = '';
            }
        }

        // Soumettre le formulaire (envoi vers webhook)
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const webhookUrl = document.getElementById('webhookUrl').value.trim();

            if (!webhookUrl) {
                showStatus('Veuillez entrer une URL de webhook ou configurez un relais serveur.', 'error');
                return;
            }

            if (selectedFiles.length === 0) {
                showStatus('Veuillez sélectionner au moins un fichier', 'error');
                return;
            }

            showStatus('Envoi en cours...', 'loading');
            const button = form.querySelector('button');
            button.disabled = true;

            try {
                for (const file of selectedFiles) {
                    const formData = new FormData();
                    formData.append('file', file, file.name);

                    const response = await fetch(webhookUrl, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error(`Erreur: ${response.status}`);
                    }
                }

                showStatus('✅ Fichiers envoyés avec succès sur Discord!', 'success');
                form.reset();
                selectedFiles = [];
                updateFileList();
            } catch (error) {
                showStatus('❌ Erreur lors de l\'envoi: ' + error.message + '\nSi l\'erreur est liée au navigateur, essayez un relais serveur.', 'error');
            } finally {
                button.disabled = false;
            }
        });

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status show ${type}`;
            if (type === 'success') {
                setTimeout(() => {
                    status.classList.remove('show');
                }, 5000);
            }
        }

        // Expose removeFile globalement pour onclick dynamique
        window.removeFile = removeFile;
    </script>
</body>
</html>
