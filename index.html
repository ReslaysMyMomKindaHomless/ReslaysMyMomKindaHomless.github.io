<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reslays Files Sender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Floating particles background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 40% 60%, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 500px 500px;
            background-position: 0 0;
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% {
                background-position: 0 0;
            }
            50% {
                background-position: 50px 50px;
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3), 
                        0 0 60px rgba(255, 255, 255, 0.1) inset;
            padding: 50px;
            max-width: 700px;
            width: 100%;
            position: relative;
            z-index: 1;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transform: translateY(0);
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 15px;
            font-weight: 500;
            animation: fadeInUp 0.8s ease-out 0.1s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 22px;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.15s; }
        .form-group:nth-child(2) { animation-delay: 0.25s; }
        .form-group:nth-child(3) { animation-delay: 0.35s; }
        .form-group:nth-child(4) { animation-delay: 0.45s; }

        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        input[type="url"],
        input[type="file"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.8);
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input[type="url"]:focus,
        input[type="file"]:focus,
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15),
                        0 10px 30px rgba(102, 126, 234, 0.2);
            background: white;
            transform: translateY(-2px);
        }

        input[type="file"] {
            padding: 12px;
            cursor: pointer;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            max-height: 150px;
        }

        .file-list {
            margin-top: 12px;
            max-height: 250px;
            overflow-y: auto;
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 12px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            animation: fadeInUp 0.8s ease-out 0.55s both;
        }

        .file-list::-webkit-scrollbar {
            width: 8px;
        }

        .file-list::-webkit-scrollbar-track {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
        }

        .file-list::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: background 0.3s;
        }

        .file-list::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            background: white;
            margin-bottom: 8px;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.1);
            transition: all 0.3s ease;
            animation: slideInLeft 0.4s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .file-item:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        }

        .file-item-name {
            color: #333;
            font-size: 13px;
            flex: 1;
            word-break: break-all;
            font-weight: 500;
        }

        .file-item-remove {
            background: linear-gradient(135deg, #ff6b6b, #ff5252);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            margin-left: 10px;
        }

        .file-item-remove:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .file-item-remove:active {
            transform: scale(0.98);
        }

        .button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out 0.65s both;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.5);
        }

        .button:hover::before {
            left: 100%;
        }

        .button:active {
            transform: translateY(-1px);
        }

        .button:disabled {
            background: linear-gradient(135deg, #ccc, #aaa);
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .status {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            display: none;
            border-left: 5px solid;
            animation: slideIn 0.4s ease-out;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1), rgba(56, 142, 60, 0.1));
            color: #2e7d32;
            border-left-color: #4caf50;
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.2);
        }

        .status.error {
            background: linear-gradient(135deg, rgba(244, 67, 54, 0.1), rgba(211, 47, 47, 0.1));
            color: #c62828;
            border-left-color: #f44336;
            box-shadow: 0 5px 20px rgba(244, 67, 54, 0.2);
        }

        .status.loading {
            background: linear-gradient(135deg, rgba(33, 150, 243, 0.1), rgba(25, 103, 210, 0.1));
            color: #1565c0;
            border-left-color: #2196f3;
            box-shadow: 0 5px 20px rgba(33, 150, 243, 0.2);
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .button, input[type="url"], input[type="file"], textarea {
                font-size: 16px; /* Prevents zoom on iOS */
            }
        }

        /* Floating animation for the container */
        @keyframes floatingContainer {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .container {
            animation: slideIn 0.8s ease-out, floatingContainer 4s ease-in-out infinite;
            animation-delay: 0s, 0.8s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Reslays Files Sender</h1>
        <p class="subtitle">Envoie des fichiers et des messages sur Discord</p>

        <form id="webhookForm">
            <div class="form-group">
                <label for="webhookUrl">🔗 URL du Webhook Discord :</label>
                <input 
                    type="url" 
                    id="webhookUrl" 
                    placeholder="https://discord.com/api/webhooks/..."
                >
            </div>

            <div class="form-group">
                <label for="discordId">🔔 ID Discord à ping (optionnel) :</label>
                <input 
                    type="text" 
                    id="discordId" 
                    placeholder="Ex: 123456789"
                >
            </div>

            <div class="form-group">
                <label for="messageText">💬 Message (optionnel) :</label>
                <textarea 
                    id="messageText" 
                    placeholder="Écris ton message ici..."
                ></textarea>
            </div>

            <div class="form-group">
                <label for="fileInput">📁 Sélectionne tes fichiers :</label>
                <input 
                    type="file" 
                    id="fileInput" 
                    multiple
                >
            </div>

            <div class="file-list" id="fileList"></div>

            <button type="submit" class="button">📤 Envoyer sur Discord</button>

            <div class="status" id="status"></div>
        </form>
    </div>

    <script>
        // --- Code d'envoi des fichiers et messages
        const form = document.getElementById('webhookForm');
        const fileInput = document.getElementById('fileInput');
        const discordId = document.getElementById('discordId');
        const messageText = document.getElementById('messageText');
        const fileList = document.getElementById('fileList');
        const status = document.getElementById('status');
        let selectedFiles = [];

        // Afficher les fichiers sélectionnés
        fileInput.addEventListener('change', (e) => {
            selectedFiles = Array.from(e.target.files);
            updateFileList();
        });

        function updateFileList() {
            fileList.innerHTML = '';
            if (selectedFiles.length === 0) {
                fileList.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">Aucun fichier sélectionné</p>';
                return;
            }

            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <span class="file-item-name">📄 ${file.name} (${(file.size / 1024).toFixed(2)} KB)</span>
                    <button type="button" class="file-item-remove" onclick="removeFile(${index})">✕ Supprimer</button>
                `;
                fileList.appendChild(fileItem);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
            if (selectedFiles.length === 0) {
                fileInput.value = '';
            }
        }

        // Soumettre le formulaire (envoi vers webhook)
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const webhookUrl = document.getElementById('webhookUrl').value.trim();
            const userId = discordId.value.trim();
            const message = messageText.value.trim();

            if (!webhookUrl) {
                showStatus('⚠️ Veuillez entrer une URL de webhook valide.', 'error');
                return;
            }

            if (message === '' && selectedFiles.length === 0) {
                showStatus('⚠️ Veuillez écrire un message ou sélectionner au moins un fichier', 'error');
                return;
            }

            showStatus('⏳ Envoi en cours...', 'loading');
            const button = form.querySelector('button');
            button.disabled = true;

            try {
                // Construire le message avec ping si ID fourni
                let finalMessage = message;
                if (userId && userId.match(/^\d+$/)) {
                    finalMessage = `<@${userId}> ${message}`.trim();
                }

                // Envoyer le message en premier s'il existe
                if (finalMessage !== '') {
                    const response = await fetch(webhookUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            content: finalMessage
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Erreur: ${response.status}`);
                    }
                }

                // Envoyer les fichiers
                for (const file of selectedFiles) {
                    const formData = new FormData();
                    formData.append('file', file, file.name);

                    const response = await fetch(webhookUrl, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error(`Erreur: ${response.status}`);
                    }
                }

                showStatus('✅ Message et fichiers envoyés avec succès sur Discord!', 'success');
                form.reset();
                selectedFiles = [];
                updateFileList();
            } catch (error) {
                showStatus('❌ Erreur lors de l\'envoi: ' + error.message, 'error');
            } finally {
                button.disabled = false;
            }
        });

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status show ${type}`;
            if (type === 'success') {
                setTimeout(() => {
                    status.classList.remove('show');
                }, 5000);
            }
        }

        // Expose removeFile globalement pour onclick dynamique
        window.removeFile = removeFile;
    </script>
</body>
</html>
